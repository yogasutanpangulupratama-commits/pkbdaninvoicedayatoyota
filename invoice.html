<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faktur Service - Daya Toyota</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 900px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); margin: auto; }
        h2, h3 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #0069d9; }
        .btn-nav { background-color: #28a745; margin-bottom: 20px; }
        .btn-nav:hover { background-color: #218838; }
        .btn-danger { background-color: #dc3545; width: auto; padding: 5px 10px; font-size: 12px; }
        .btn-danger:hover { background-color: #c82333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: #343a40; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .search-box { margin-bottom: 15px; padding: 8px; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-nav" onclick="window.location.href='pkb.html'">KEMBALI KE PKB</button>
    
    <h2>Sistem Buat Faktur / Invoice Service</h2>
    <h3>Daya Toyota</h3>
    
    <div class="form-group">
        <label>No. Invoice / Faktur:</label>
        <input type="text" id="noInvoice" placeholder="Contoh: INV/2026/001">
    </div>
    <div class="form-group">
        <label>No. Polisi Kendaraan:</label>
        <input type="text" id="noPolisiInv" placeholder="Contoh: B 1234 ABC">
    </div>
    <div class="form-group">
        <label>Total Biaya Jasa Servis (Rp):</label>
        <input type="number" id="biayaJasa" placeholder="0">
    </div>
    <div class="form-group">
        <label>Total Biaya Suku Cadang / Part (Rp):</label>
        <input type="number" id="biayaPart" placeholder="0">
    </div>
    
    <button onclick="simpanInvoice()">SIMPAN DATA FAKTUR</button>
    
    <hr style="margin: 30px 0;">
    
    <h3>Riwayat Faktur Penjualan Service</h3>
    <input type="text" id="searchInv" class="search-box" placeholder="Cari berdasarkan No. Invoice atau No. Polisi..." onkeyup="cariInvoice()">
    
    <table>
        <thead>
            <tr>
                <th>Tanggal Pembuatan</th>
                <th>No. Invoice</th>
                <th>No. Polisi</th>
                <th>Biaya Jasa</th>
                <th>Biaya Part</th>
                <th>Total Pembayaran</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelInvoice">
            <!-- Data dari Firebase akan muncul di sini -->
        </tbody>
    </table>
</div>

<!-- Ambil modul Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhHmuJjcJn4weiMYSFTnsdetqkYut62Ys",
        authDomain: "pkbmanualdaninvoice.firebaseapp.com",
        databaseURL: "https://pkbmanualdaninvoice-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "pkbmanualdaninvoice",
        storageBucket: "pkbmanualdaninvoice.firebasestorage.app",
        messagingSenderId: "812674696678",
        appId: "1:812674696678:web:19ef84fdeaa645bf6e4227"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Fungsi Simpan Invoice Online
    window.simpanInvoice = function() {
        const noInvoice = document.getElementById('noInvoice').value.trim();
        const noPolisi = document.getElementById('noPolisiInv').value.trim();
        const biayaJasa = parseFloat(document.getElementById('biayaJasa').value) || 0;
        const biayaPart = parseFloat(document.getElementById('biayaPart').value) || 0;
        
        if(!noInvoice || !noPolisi) {
            alert('Mohon isi nomor invoice dan nomor polisi terlebih dahulu!');
            return;
        }

        const totalBayar = biayaJasa + biayaPart;
        const waktuSekarang = new Date().toLocaleString('id-ID');

        const invRef = ref(db, 'riwayatInvoice');
        const dataBaruRef = push(invRef);

        set(dataBaruRef, {
            waktu: waktuSekarang,
            noInvoice: noInvoice,
            noPolisi: noPolisi,
            biayaJasa: biayaJasa,
            biayaPart: biayaPart,
            totalBayar: totalBayar
        }).then(() => {
            alert('Data Faktur Berhasil Tersimpan Online!');
            // Reset Form
            document.getElementById('noInvoice').value = '';
            document.getElementById('noPolisiInv').value = '';
            document.getElementById('biayaJasa').value = '';
            document.getElementById('biayaPart').value = '';
        }).catch((error) => {
            alert('Gagal menyimpan: ' + error.message);
        });
    }

    // Tampilkan Riwayat Invoice Real-time
    const riwayatInvRef = ref(db, 'riwayatInvoice');
    onValue(riwayatInvRef, (snapshot) => {
        const tbody = document.getElementById('tabelInvoice');
        tbody.innerHTML = '';
        const data = snapshot.val();
        
        if (data) {
            Object.keys(data).forEach((key) => {
                const item = data[key];
                const row = `<tr>
                    <td>${item.waktu}</td>
                    <td><b>${item.noInvoice}</b></td>
                    <td>${item.noPolisi}</td>
                    <td>Rp ${item.biayaJasa.toLocaleString('id-ID')}</td>
                    <td>Rp ${item.biayaPart.toLocaleString('id-ID')}</td>
                    <td><b>Rp ${item.totalBayar.toLocaleString('id-ID')}</b></td>
                    <td><button class="btn-danger" onclick="hapusInvoice('${key}')">Hapus</button></td>
                </tr>`;
                tbody.innerHTML += row;
            });
        } else {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#999;">Belum ada riwayat invoice.</td></tr>';
        }
    });

    // Fungsi Hapus Invoice Online
    window.hapusInvoice = function(id) {
        if(confirm('Apakah Anda yakin ingin menghapus permanen data invoice ini?')) {
            remove(ref(db, 'riwayatInvoice/' + id));
        }
    }

    // Fungsi Pencarian Lokal Invoice
    window.cariInvoice = function() {
        const input = document.getElementById('searchInv').value.toUpperCase();
        const rows = document.getElementById('tabelInvoice').getElementsByTagName('tr');
        for (let i = 0; i < rows.length; i++) {
            const tdInv = rows[i].getElementsByTagName('td')[1];
            const tdPolisi = rows[i].getElementsByTagName('td')[2];
            if (tdInv || tdPolisi) {
                const txtInv = tdInv.textContent || tdInv.innerText;
                const txtPolisi = tdPolisi.textContent || tdPolisi.innerText;
                if (txtInv.toUpperCase().indexOf(input) > -1 || txtPolisi.toUpperCase().indexOf(input) > -1) {
                    rows[i].style.display = "";
                } else {
                    rows[i].style.display = "none";
                }
            }
        }
    }
</script>
</body>
</html>
