<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem PKB - Daya Toyota</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 900px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); margin: auto; }
        h2, h3 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #218838; }
        .btn-nav { background-color: #007bff; margin-bottom: 20px; }
        .btn-nav:hover { background-color: #0069d9; }
        .btn-danger { background-color: #dc3545; width: auto; padding: 5px 10px; font-size: 12px; }
        .btn-danger:hover { background-color: #c82333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
        th { background-color: #343a40; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .search-box { margin-bottom: 15px; padding: 8px; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-nav" onclick="window.location.href='invoice.html'">MENU INVOICE</button>
    
    <h2>Sistem Input PKB (Perintah Kerja Bengkel)</h2>
    <h3>Daya Toyota</h3>
    
    <div class="form-group">
        <label>No. Registrasi / No. Polisi:</label>
        <input type="text" id="noPolisi" placeholder="Contoh: B 1234 ABC">
    </div>
    <div class="form-group">
        <label>Nama Pemilik / Pelanggan:</label>
        <input type="text" id="namaPelanggan" placeholder="Nama Lengkap">
    </div>
    <div class="form-group">
        <label>Tipe Kendaraan:</label>
        <input type="text" id="tipeMobil" placeholder="Contoh: Avanza, Innova, Rush">
    </div>
    <div class="form-group">
        <label>Jenis Pekerjaan:</label>
        <select id="jenisPekerjaan">
            <option value="Servis Berkala">Servis Berkala</option>
            <option value="Perbaikan Ringan (General Repair)">Perbaikan Ringan (General Repair)</option>
            <option value="Perbaikan Berat (Heavy Repair)">Perbaikan Berat (Heavy Repair)</option>
            <option value="Keluhan AC / Elektrikal">Keluhan AC / Elektrikal</option>
            <option value="Body & Paint">Body & Paint</option>
        </select>
    </div>
    <div class="form-group">
        <label>Nama Service Advisor (SA):</label>
        <input type="text" id="namaSA" placeholder="Nama SA yang bertugas">
    </div>
    
    <button onclick="simpanPKB()">SIMPAN DATA PKB</button>
    
    <hr style="margin: 30px 0;">
    
    <h3>Riwayat Pendaftaran PKB</h3>
    <input type="text" id="searchPKB" class="search-box" placeholder="Cari berdasarkan No. Polisi atau Nama..." onkeyup="cariData()">
    
    <table>
        <thead>
            <tr>
                <th>Tanggal/Jam</th>
                <th>No. Polisi</th>
                <th>Nama Pelanggan</th>
                <th>Tipe Mobil</th>
                <th>Jenis Pekerjaan</th>
                <th>Service Advisor</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabelRiwayat">
            <!-- Data dari Firebase akan muncul di sini -->
        </tbody>
    </table>
</div>

<!-- Ambil modul Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhHmuJjcJn4weiMYSFTnsdetqkYut62Ys",
        authDomain: "pkbmanualdaninvoice.firebaseapp.com",
        databaseURL: "https://pkbmanualdaninvoice-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "pkbmanualdaninvoice",
        storageBucket: "pkbmanualdaninvoice.firebasestorage.app",
        messagingSenderId: "812674696678",
        appId: "1:812674696678:web:19ef84fdeaa645bf6e4227"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Fungsi Simpan ke Firebase Database Online
    window.simpanPKB = function() {
        const noPolisi = document.getElementById('noPolisi').value.trim();
        const namaPelanggan = document.getElementById('namaPelanggan').value.trim();
        const tipeMobil = document.getElementById('tipeMobil').value.trim();
        const jenisPekerjaan = document.getElementById('jenisPekerjaan').value.type || document.getElementById('jenisPekerjaan').value;
        const namaSA = document.getElementById('namaSA').value.trim();
        
        if(!noPolisi || !namaPelanggan || !tipeMobil || !namaSA) {
            alert('Mohon isi semua kolom data terlebih dahulu!');
            return;
        }

        const waktuSekarang = new Date().toLocaleString('id-ID');
        const pkbRef = ref(db, 'riwayatPKB');
        const dataBaruRef = push(pkbRef);

        set(dataBaruRef, {
            waktu: waktuSekarang,
            noPolisi: noPolisi,
            namaPelanggan: namaPelanggan,
            tipeMobil: tipeMobil,
            jenisPekerjaan: jenisPekerjaan,
            namaSA: namaSA
        }).then(() => {
            alert('Data PKB Berhasil Tersimpan Online!');
            // Reset Form
            document.getElementById('noPolisi').value = '';
            document.getElementById('namaPelanggan').value = '';
            document.getElementById('tipeMobil').value = '';
            document.getElementById('namaSA').value = '';
        }).catch((error) => {
            alert('Gagal menyimpan: ' + error.message);
        });
    }

    // Tampilkan Riwayat dari Firebase Secara Real-time
    const riwayatRef = ref(db, 'riwayatPKB');
    onValue(riwayatRef, (snapshot) => {
        const tbody = document.getElementById('tabelRiwayat');
        tbody.innerHTML = '';
        const data = snapshot.val();
        
        if (data) {
            Object.keys(data).forEach((key) => {
                const item = data[key];
                const row = `<tr>
                    <td>${item.waktu}</td>
                    <td><b>${item.noPolisi}</b></td>
                    <td>${item.namaPelanggan}</td>
                    <td>${item.tipeMobil}</td>
                    <td>${item.jenisPekerjaan}</td>
                    <td>${item.namaSA}</td>
                    <td><button class="btn-danger" onclick="hapusPKB('${key}')">Hapus</button></td>
                </tr>`;
                tbody.innerHTML += row;
            });
        } else {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#999;">Belum ada riwayat pendaftaran.</td></tr>';
        }
    });

    // Fungsi Hapus Data Online
    window.hapusPKB = function(id) {
        if(confirm('Apakah Anda yakin ingin menghapus permanen data ini?')) {
            remove(ref(db, 'riwayatPKB/' + id));
        }
    }

    // Fungsi Pencarian Lokal Tabel
    window.cariData = function() {
        const input = document.getElementById('searchPKB').value.toUpperCase();
        const rows = document.getElementById('tabelRiwayat').getElementsByTagName('tr');
        for (let i = 0; i < rows.length; i++) {
            const tdPolisi = rows[i].getElementsByTagName('td')[1];
            const tdNama = rows[i].getElementsByTagName('td')[2];
            if (tdPolisi || tdNama) {
                const txtPolisi = tdPolisi.textContent || tdPolisi.innerText;
                const txtNama = tdNama.textContent || tdNama.innerText;
                if (txtPolisi.toUpperCase().indexOf(input) > -1 || txtNama.toUpperCase().indexOf(input) > -1) {
                    rows[i].style.display = "";
                } else {
                    rows[i].style.display = "none";
                }
            }
        }
    }
</script>
</body>
</html>
